name: Weekly Pipeline Run

on:
  schedule:
    - cron: '0 1 * * 1'  # Monday 01:00 UTC = 06:30 IST
  workflow_dispatch: {}

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wake HF Space
        run: |
          echo "Restarting Market Intelligence Space..."
          curl -s -X POST \
            "https://huggingface.co/api/spaces/jtlevine/market-intelligence/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            || true
          echo "Wake POST sent. Health-check loop will wait for the Space to come up."

      - name: Wait for Space to be healthy
        run: |
          # Poll up to 10 minutes — replaces the fixed sleep 90 that masked
          # cold-start delays. Same hardening as the WA fix that recovered
          # 5 weeks of silent-failure Monday crons.
          MAX_WAIT=600
          INTERVAL=20
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if curl -sf "https://jtlevine-market-intelligence.hf.space/health" > /dev/null; then
              echo "[${ELAPSED}s] Space is healthy"
              exit 0
            fi
            echo "[${ELAPSED}s] not yet ready"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Space never came up within ${MAX_WAIT}s"
          exit 1

      - name: Trigger pipeline run
        run: |
          echo "Triggering pipeline..."
          # Capture HTTP status + validate JSON body. Bail loudly if not 2xx
          # or non-JSON (the silent-404-HTML failure mode).
          HTTP_STATUS=$(curl -s -o /tmp/trigger.out -w '%{http_code}' \
            -X POST "https://jtlevine-market-intelligence.hf.space/api/pipeline/trigger" \
            -H "Content-Type: application/json")
          echo "HTTP $HTTP_STATUS"
          echo "Body:"
          cat /tmp/trigger.out
          echo
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Trigger returned non-2xx status — aborting."
            exit 1
          fi
          if ! python3 -c "import json,sys; json.load(open('/tmp/trigger.out'))" 2>/dev/null; then
            echo "Trigger response is not valid JSON (likely an HF 404 HTML page) — aborting."
            exit 1
          fi

      - name: Wait for pipeline completion
        run: |
          MAX_WAIT=900  # 15 minutes
          ELAPSED=0
          INTERVAL=30
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -s "https://jtlevine-market-intelligence.hf.space/api/pipeline/status" 2>/dev/null || echo '{}')
            RUNNING=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('running', True))" 2>/dev/null || echo "true")
            STEP=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('current_step', '?'))" 2>/dev/null || echo "?")
            echo "[$ELAPSED s] running: $RUNNING, step: $STEP"
            if [ "$RUNNING" = "False" ]; then
              echo "Pipeline completed!"
              HEALTH=$(curl -s "https://jtlevine-market-intelligence.hf.space/health" 2>/dev/null || echo '{}')
              echo "Health: $HEALTH"
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Timed out waiting for pipeline"
          exit 1

      - name: Pause HF Space
        if: always()
        run: |
          echo "Pausing Space to stop billing..."
          curl -s -X POST \
            "https://huggingface.co/api/spaces/jtlevine/market-intelligence/pause" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            || true
          echo "Space paused."
